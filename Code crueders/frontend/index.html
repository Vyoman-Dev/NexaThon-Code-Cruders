<!DOCTYPE html>
<html>
<head>
<title>MediPulse</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>MediPulse Healthcare Platform</h1>

<nav>
<a href="#services">Services</a>
<a href="#doctors">Doctors</a>
<a href="#donor">Blood Donor</a>
<a href="#hospital">Hospitals</a>
</nav>

</header>


<section class="hero">

<h2>Emergency Healthcare Support</h2>

<button onclick="triggerSOS()">SOS Emergency</button>

</section>


<section id="services">

<h2>Services</h2>

<div class="card">
<h3>Find Blood Donor</h3>
<input id="bloodType" placeholder="Enter blood group">
<button onclick="findDonor()">Search</button>
<div id="donorResult"></div>
</div>

<div class="card">
<h3>Hospital Beds</h3>
<button onclick="checkBeds()">Check Availability</button>
<div id="hospitalResult"></div>
</div>

</section>


<section id="doctors">

<h2>Doctors</h2>
<div id="doctorList"></div>

</section>


<footer>

<p>Emergency Numbers India: 112 | Ambulance 108</p>

</footer>

<script src="js/app.js"></script>

</body>
</html>
